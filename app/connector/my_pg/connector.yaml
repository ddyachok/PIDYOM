kind: Connector
version: v2
definition:
  name: my_pg
  subgraph: app
  source: hasura/postgres-promptql:v1.4.0
  context: .
  envMapping:
    FULLY_QUALIFY_TABLE_NAMES:
      fromEnv: APP_MY_PG_FULLY_QUALIFY_TABLE_NAMES
    HASURA_CONNECTOR_PORT:
      fromEnv: APP_MY_PG_HASURA_CONNECTOR_PORT
    HASURA_LOG_LEVEL:
      fromEnv: APP_MY_PG_HASURA_LOG_LEVEL
    HASURA_SERVICE_TOKEN_SECRET:
      fromEnv: APP_MY_PG_HASURA_SERVICE_TOKEN_SECRET
    JDBC_SCHEMAS:
      fromEnv: APP_MY_PG_JDBC_SCHEMAS
    JDBC_URL:
      fromEnv: APP_MY_PG_JDBC_URL
    OTEL_EXPORTER_OTLP_ENDPOINT:
      fromEnv: APP_MY_PG_OTEL_EXPORTER_OTLP_ENDPOINT
    OTEL_SERVICE_NAME:
      fromEnv: APP_MY_PG_OTEL_SERVICE_NAME
