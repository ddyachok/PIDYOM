<svg viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg">
  <!-- PIDYOM v2 — Deconstructed / Warped (Acid Shapes-inspired) -->
  <rect width="800" height="550" fill="#E8E8E1"/>

  <!-- Page number badge -->
  <g transform="translate(30, 25)">
    <rect x="0" y="0" width="36" height="36" rx="18" fill="none" stroke="#0A0A0A" stroke-width="1.2"/>
    <text x="18" y="24" text-anchor="middle" font-family="'Space Mono', monospace" font-size="12" fill="#0A0A0A">01</text>
  </g>

  <!-- Top right label -->
  <text x="770" y="38" text-anchor="end" font-family="'Space Mono', monospace" font-size="9" letter-spacing="2" fill="#0A0A0A" opacity="0.6">PIDYOM IDENTITY</text>

  <!-- Warped/stretched "PIDYOM" — top version, lighter, distorted -->
  <g transform="translate(80, 80)">
    <text font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
          font-weight="800" font-size="42" letter-spacing="8" fill="none" stroke="#0A0A0A" stroke-width="0.8"
          transform="skewX(-8) scaleY(1.3)">
      <tspan x="0" y="50">PIDYOM</tspan>
    </text>
  </g>

  <!-- Metadata block left -->
  <g transform="translate(85, 160)" font-family="'Space Mono', monospace" font-size="8" fill="#0A0A0A" opacity="0.5">
    <text x="0" y="0">TYPE</text>
    <text x="0" y="12">PIDYOM</text>
    <text x="0" y="24">KETTLEBELL</text>
    <text x="0" y="36">TRACKER</text>
    <text x="0" y="48">2025</text>
  </g>

  <!-- Main deconstructed logo — large warped letterforms -->
  <g transform="translate(40, 200)">
    <!-- P — massive, warped -->
    <path d="
      M0 200 L0 0 Q5 -10 20 -5 L80 -8 Q140 -12 150 30
      Q160 70 140 95 Q120 115 80 110 L50 105
      Q35 103 30 110 L30 195 Q28 210 15 205Z
    " fill="#0A0A0A" opacity="0.9"/>
    <ellipse cx="85" cy="42" rx="32" ry="28" fill="#E8E8E1" transform="rotate(-5, 85, 42)"/>

    <!-- I — tall distorted slab -->
    <path d="
      M175 -12 Q185 -18 195 -10 L198 195 Q200 210 188 205
      L180 200 Q172 195 170 180 L168 10 Q167 -5 175 -12Z
    " fill="#0A0A0A" opacity="0.85"/>

    <!-- D — organic blob-D -->
    <path d="
      M225 200 L222 5 Q220 -10 235 -8 L290 -12
      Q370 -15 380 60 Q390 130 360 170 Q330 205 275 208Z
    " fill="#0A0A0A" opacity="0.9"/>
    <path d="
      M260 25 L280 22 Q335 18 340 65 Q345 110 325 145
      Q310 170 275 172 L260 170Z
    " fill="#E8E8E1"/>

    <!-- Y — sharp angular splinter -->
    <path d="
      M400 -15 Q408 -20 415 -8 L445 75 L478 -12 Q483 -22 495 -15
      L500 -10 Q505 -2 498 15 L465 92 L470 200 Q472 212 458 208
      L448 205 Q438 202 440 190 L442 92 L398 8 Q392 -5 400 -15Z
    " fill="#0A0A0A" opacity="0.85"/>

    <!-- O — deformed circle/blob -->
    <path d="
      M530 100 Q525 30 570 5 Q620 -22 660 20
      Q700 62 695 110 Q690 165 650 195
      Q610 220 565 200 Q530 180 530 100Z
    " fill="#0A0A0A" opacity="0.9"/>
    <path d="
      M560 95 Q558 50 585 35 Q615 18 638 45
      Q660 72 655 110 Q650 150 628 165
      Q605 180 580 165 Q560 148 560 95Z
    " fill="#E8E8E1"/>

    <!-- M — fragmented/glitched -->
    <path d="
      M720 200 L718 0 Q716 -12 730 -8 L745 -5
      Q755 -2 753 15 L750 80 L770 25 Q775 10 785 18
      L800 80 L798 10 Q796 -5 810 -8 L825 -10
      Q838 -12 836 5 L832 200 Q830 212 818 208
      L808 205 L790 120 Q785 105 778 120 L758 205
      L745 208 Q732 212 730 200Z
    " fill="#0A0A0A" opacity="0.85" transform="translate(-40, 0)"/>
  </g>

  <!-- Metadata block right -->
  <g transform="translate(550, 160)" font-family="'Space Mono', monospace" font-size="8" fill="#0A0A0A" opacity="0.5">
    <text x="0" y="0">DESIGN</text>
    <text x="80" y="0">SYSTEM</text>
    <text x="0" y="12">V.0.2.1</text>
    <text x="80" y="12">R</text>
    <text x="0" y="30">TYPEFACE</text>
    <text x="0" y="42">BARLOW CONDENSED</text>
    <text x="0" y="54">SPACE MONO</text>
  </g>

  <!-- Bottom metadata -->
  <g transform="translate(85, 470)" font-family="'Space Mono', monospace" font-size="8" fill="#0A0A0A" opacity="0.5">
    <text x="0" y="0">BRAND</text>
    <text x="0" y="12">P.I.D.Y.O.M</text>
    <text x="0" y="24">TYPE: A</text>
    <text x="100" y="0">TYPEFACE</text>
    <text x="100" y="12">CUSTOM DECON</text>
    <text x="100" y="24">2025</text>
  </g>

  <!-- Bottom divider line -->
  <line x1="85" y1="510" x2="350" y2="510" stroke="#0A0A0A" stroke-width="2.5"/>

  <!-- Small icon bottom right -->
  <g transform="translate(720, 465)">
    <path d="M25 40 L15 25 L20 12 C22 5 28 0 32 0 C36 0 42 5 44 12 L49 25 L39 40Z"
      fill="#0A0A0A" opacity="0.8"/>
    <path d="M27 15 C27 10 30 7 32 7 C34 7 37 10 37 15"
      fill="none" stroke="#E8E8E1" stroke-width="1.5"/>
  </g>
</svg>
