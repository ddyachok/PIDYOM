<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!--
    PIDYOM — 16×16 Simplified Icon
    Reduced to 2 features: circle (body) + arc (handle)
    Pixel-aligned for maximum clarity at tiny sizes
    The 5° tilt is maintained for brand consistency
  -->
  <g transform="translate(8, 8.5) rotate(5)">
    <!-- Body circle — 5px radius (centered lower) -->
    <circle cx="0" cy="2.5" r="5" fill="#1A1A1A"/>
    <!-- Handle arc — simplified thick stroke -->
    <path d="
      M-3.2 -1
      C-3.5 -3 -2.5 -5.2 0 -6
      C2.5 -5.2 3.5 -3 3.2 -1
    " fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
