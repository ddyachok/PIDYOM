<svg viewBox="0 0 600 850" xmlns="http://www.w3.org/2000/svg">
  <!--
    PIDYOM — Identity System Poster
    Brutalist editorial layout with halftone texture references
    All measurements from Fibonacci grid
  -->
  <defs>
    <!-- Halftone dot pattern (cast iron texture) -->
    <pattern id="halftone" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#F0EDE8" opacity="0.06"/>
    </pattern>
    <!-- Dither noise pattern -->
    <pattern id="dither" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="#F0EDE8" opacity="0.03"/>
      <rect x="1" y="1" width="1" height="1" fill="#F0EDE8" opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="600" height="850" fill="#1A1A1A"/>
  <rect width="600" height="850" fill="url(#halftone)"/>

  <!-- ===== TOP SECTION: System label ===== -->
  <g font-family="'Space Mono', 'Courier New', monospace">
    <text x="30" y="35" font-size="8" letter-spacing="2" fill="#6A6A62">BRAND IDENTITY SYSTEM</text>
    <text x="570" y="35" text-anchor="end" font-size="8" letter-spacing="2" fill="#6A6A62">V.03</text>
    <line x1="30" y1="45" x2="570" y2="45" stroke="#F0EDE8" stroke-width="0.3" opacity="0.1"/>
  </g>

  <!-- ===== MAIN MARK — Large centered ===== -->
  <g transform="translate(300, 200) rotate(5) scale(2.5)">
    <circle cx="0" cy="48" r="40" fill="#F0EDE8"/>
    <path d="
      M-25 17
      C-27 2 -24 -15 -17 -25
      C-10 -35 -3 -40 0 -42
      C3 -40 10 -35 17 -25
      C24 -15 27 2 25 17
      L17 13
      C19 2 17 -9 12 -17
      C7 -25 3 -30 0 -32
      C-3 -30 -7 -25 -12 -17
      C-17 -9 -19 2 -17 13
      Z
    " fill="#F0EDE8"/>
  </g>

  <!-- Construction grid overlay (showing Fibonacci) -->
  <g stroke="#C6FF00" stroke-width="0.3" opacity="0.08">
    <!-- Golden rectangle around mark -->
    <rect x="195" y="55" width="210" height="340" fill="none"/>
    <!-- φ division -->
    <line x1="195" y1="265" x2="405" y2="265"/>
    <!-- Center cross -->
    <line x1="300" y1="55" x2="300" y2="395"/>
    <line x1="195" y1="200" x2="405" y2="200"/>
  </g>

  <!-- ===== WORDMARK below mark ===== -->
  <g transform="translate(125, 430)">
    <!-- PIDYOM — custom geometric, large -->
    <!-- P -->
    <path d="M0 100 L0 0 L30 0 C44 0 50 9 50 22 C50 35 42 44 30 44 L16 44 L16 100Z"
          fill="#F0EDE8"/>
    <path d="M14 12 L28 12 C33 12 36 17 36 22 C36 27 33 32 28 32 L14 32Z"
          fill="#1A1A1A"/>

    <!-- I -->
    <path d="M62 100 L62 0 L78 0 L78 100Z" fill="#F0EDE8"/>

    <!-- D -->
    <path d="M90 0 L115 0 C140 0 150 17 150 50 C150 83 140 100 115 100 L90 100Z"
          fill="#F0EDE8"/>
    <path d="M104 14 L112 14 C128 14 135 27 135 50 C135 73 128 86 112 86 L104 86Z"
          fill="#1A1A1A"/>

    <!-- Y -->
    <path d="M162 0 L178 42 L194 0 L212 0 L188 60 L188 100 L172 100 L172 60 L148 0Z"
          fill="#F0EDE8"/>

    <!-- O -->
    <path d="M222 0 L260 0 C273 0 280 12 280 25 L280 75 C280 88 273 100 260 100
             L222 100 C209 100 202 88 202 75 L202 25 C202 12 209 0 222 0Z"
          fill="#F0EDE8"/>
    <path d="M226 16 L256 16 C262 16 266 20 266 25 L266 75
             C266 80 262 84 256 84 L226 84 C220 84 216 80 216 75
             L216 25 C216 20 220 16 226 16Z"
          fill="#1A1A1A"/>

    <!-- M -->
    <path d="M295 100 L295 0 L311 0 L327 38 L343 0 L359 0 L359 100 L345 100
             L345 30 L330 63 L324 63 L309 30 L309 100Z"
          fill="#F0EDE8"/>
  </g>

  <!-- ===== METADATA SECTION ===== -->
  <line x1="30" y1="560" x2="570" y2="560" stroke="#F0EDE8" stroke-width="0.3" opacity="0.1"/>

  <g font-family="'Space Mono', 'Courier New', monospace" font-size="8" letter-spacing="1.5">
    <!-- Column 1: Etymology -->
    <text x="30" y="585" fill="#C6FF00" opacity="0.8">ETYMOLOGY</text>
    <text x="30" y="600" fill="#6A6A62">ПІДЙОМ [UKR]</text>
    <text x="30" y="612" fill="#6A6A62">= LIFT / RISE</text>
    <text x="30" y="624" fill="#6A6A62">= ASCENT</text>
    <text x="30" y="642" fill="#6A6A62">PIDYON [HEB]</text>
    <text x="30" y="654" fill="#6A6A62">= REDEMPTION</text>

    <!-- Column 2: Construction -->
    <text x="190" y="585" fill="#C6FF00" opacity="0.8">CONSTRUCTION</text>
    <text x="190" y="600" fill="#6A6A62">FIBONACCI GRID</text>
    <text x="190" y="612" fill="#6A6A62">1,1,2,3,5,8,13</text>
    <text x="190" y="624" fill="#6A6A62">BODY R: 40 (FIB.8×5)</text>
    <text x="190" y="636" fill="#6A6A62">HANDLE R: 30 (FIB.5×6)</text>
    <text x="190" y="648" fill="#6A6A62">RATIO: 1:φ</text>
    <text x="190" y="660" fill="#6A6A62">TILT: 5°</text>

    <!-- Column 3: Color -->
    <text x="380" y="585" fill="#C6FF00" opacity="0.8">PALETTE</text>

    <rect x="380" y="595" width="12" height="12" fill="#1A1A1A" stroke="#6A6A62" stroke-width="0.5"/>
    <text x="398" y="605" fill="#6A6A62">CHARCOAL #1A1A1A</text>

    <rect x="380" y="614" width="12" height="12" fill="#F0EDE8" stroke="#6A6A62" stroke-width="0.5"/>
    <text x="398" y="624" fill="#6A6A62">CHALK #F0EDE8</text>

    <rect x="380" y="633" width="12" height="12" fill="#C6FF00"/>
    <text x="398" y="643" fill="#6A6A62">VOLT #C6FF00</text>

    <rect x="380" y="652" width="12" height="12" fill="#6A6A62"/>
    <text x="398" y="662" fill="#6A6A62">SLATE #6A6A62</text>
  </g>

  <!-- ===== TYPOGRAPHY SECTION ===== -->
  <line x1="30" y1="685" x2="570" y2="685" stroke="#F0EDE8" stroke-width="0.3" opacity="0.1"/>

  <g font-family="'Space Mono', 'Courier New', monospace" font-size="8" letter-spacing="1.5">
    <text x="30" y="710" fill="#C6FF00" opacity="0.8">TYPOGRAPHY</text>

    <text x="30" y="730" fill="#6A6A62">DISPLAY: BARLOW CONDENSED 800</text>
    <text x="30" y="742" fill="#6A6A62">BODY: SPACE MONO 400/700</text>
    <text x="30" y="754" fill="#6A6A62">ACCENT: BARLOW CONDENSED 400</text>
  </g>

  <!-- Display font sample -->
  <text x="300" y="745" font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
        font-weight="800" font-size="36" letter-spacing="8" fill="#F0EDE8" opacity="0.15">
    LIFT RISE MOVE FLOW
  </text>

  <!-- ===== ICON SIZES SECTION ===== -->
  <line x1="30" y1="775" x2="570" y2="775" stroke="#F0EDE8" stroke-width="0.3" opacity="0.1"/>

  <g font-family="'Space Mono', 'Courier New', monospace" font-size="8" letter-spacing="1.5">
    <text x="30" y="800" fill="#C6FF00" opacity="0.8">ICON SIZES</text>
  </g>

  <!-- 48px icon -->
  <g transform="translate(145, 790) rotate(5) scale(0.22)">
    <circle cx="0" cy="48" r="40" fill="#F0EDE8"/>
    <path d="M-25 17 C-27 2 -24 -15 -17 -25 C-10 -35 -3 -40 0 -42 C3 -40 10 -35 17 -25 C24 -15 27 2 25 17 L17 13 C19 2 17 -9 12 -17 C7 -25 3 -30 0 -32 C-3 -30 -7 -25 -12 -17 C-17 -9 -19 2 -17 13 Z" fill="#F0EDE8"/>
  </g>
  <text x="145" y="830" text-anchor="middle" font-family="'Space Mono', monospace" font-size="7" fill="#6A6A62">48px</text>

  <!-- 32px icon -->
  <g transform="translate(210, 793) rotate(5) scale(0.15)">
    <circle cx="0" cy="48" r="40" fill="#F0EDE8"/>
    <path d="M-25 17 C-27 2 -24 -15 -17 -25 C-10 -35 -3 -40 0 -42 C3 -40 10 -35 17 -25 C24 -15 27 2 25 17 L17 13 C19 2 17 -9 12 -17 C7 -25 3 -30 0 -32 C-3 -30 -7 -25 -12 -17 C-17 -9 -19 2 -17 13 Z" fill="#F0EDE8"/>
  </g>
  <text x="210" y="830" text-anchor="middle" font-family="'Space Mono', monospace" font-size="7" fill="#6A6A62">32px</text>

  <!-- 16px icon -->
  <g transform="translate(260, 797) rotate(5) scale(0.08)">
    <circle cx="0" cy="48" r="40" fill="#F0EDE8"/>
    <path d="M-25 17 C-27 2 -24 -15 -17 -25 C-10 -35 -3 -40 0 -42 C3 -40 10 -35 17 -25 C24 -15 27 2 25 17 L17 13 C19 2 17 -9 12 -17 C7 -25 3 -30 0 -32 C-3 -30 -7 -25 -12 -17 C-17 -9 -19 2 -17 13 Z" fill="#F0EDE8"/>
  </g>
  <text x="260" y="830" text-anchor="middle" font-family="'Space Mono', monospace" font-size="7" fill="#6A6A62">16px</text>

  <!-- Bottom line -->
  <line x1="30" y1="845" x2="200" y2="845" stroke="#C6FF00" stroke-width="1.5" opacity="0.3"/>
</svg>
