    <path d="
      M205 92 C218 88 232 95 236 108
      C240 122 235 140 225 152
      C215 162 200 160 195 148
      C190 135 195 96 205 92Z
    " fill="#0A0A0A" opacity="0.7"/>

    <!-- y - flowing down -->
    <path d="
      M280 80 C278 95 282 115 285 135 C288 150 292 165 290 175
    " fill="none" stroke="#0A0A0A" stroke-width="2.2" stroke-linecap="round"/>
    <path d="
      M320 78 C318 95 315 115 310 140 C305 165 298 195 290 220
      C282 245 270 265 260 275 C252 282 245 278 250 270
    " fill="none" stroke="#0A0A0A" stroke-width="2.2" stroke-linecap="round"/>

    <!-- o - organic blob -->
    <path d="
      M360 100 C380 85 405 82 420 92 C435 102 440 122 435 142
      C430 160 415 175 395 178 C375 180 355 170 348 152
      C342 135 345 112 360 100Z
    " fill="none" stroke="#0A0A0A" stroke-width="2.2"
