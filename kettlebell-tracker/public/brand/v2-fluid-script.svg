    <path d="
      M55 25 C68 30 82 35 90 45 C96 53 95 65 88 72
      C80 80 65 78 55 74 C48 71 44 65 46 55
      C47 45 52 35 55 25Z
    " fill="#0A0A0A" opacity="0.85"/>

    <!-- i - fluid dot + stroke -->
