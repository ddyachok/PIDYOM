      M520 95 C535 88 550 92 555 105
      C560 118 555 135 545 142
      C535 148 522 142 518 130
      C514 118 510 100 520 95Z
    " fill="#0A0A0A" opacity="0.9"/>
  </g>

  <!-- Structured metadata grid (HIT-inspired) -->
  <g transform="translate(80, 30)" font-family="'Space Mono', 'Courier New', monospace">
    <!-- Circle letters P-I-D -->
    <circle cx="15" cy="15" r="13" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
    <text x="15" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#0A0A0A">P</text>
    <circle cx="45" cy="15" r="13" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
    <text x="45" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#0A0A0A">I</text>
    <circle cx="30" cy="43" r="13" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
    <text x="30" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#0A0A0A">D</text>

    <!-- Metadata text block 1 -->
    <text x="75" y="15" font-size="10" letter-spacing="1" fill="#0A0A0A">Kettlebell</text>
    <text x="75" y="28" font-size="10" letter-spacing="1" fill="#0A0A0A">est.2025</text>
    <text x="75" y="41" font-size="10" letter-spacing="1" fill="#0A0A0A">Track</text>
    <text x="75" y="54" font-size="10" letter-spacing="1" fill="#0A0A0A">Progress</text>

    <!-- Divider slashes -->
    <text x="180" y="28" font-size="16" fill="#0A0A0A" opacity="0.4">//</text>

    <!-- Metadata text block 2 -->
    <text x="210" y="15" font-size="10" letter-spacing="1" fill="#0A0A0A">Workout</text>
    <text x="290" y="15" font-size="10" letter-spacing="1" fill="#0A0A0A">Strength</text>
    <text x="210" y="28" font-size="10" letter-spacing="1" fill="#0A0A0A">Schedule</text>
    <text x="290" y="28" font-size="10" letter-spacing="1" fill="#0A0A0A">Power</text>
    <text x="210" y="41" font-size="10" letter-spacing="1" fill="#0A0A0A">Analytics</text>
    <text x="290" y="41" font-size="10" letter-spacing="1" fill="#0A0A0A">Community</text>
  </g>
</svg>
