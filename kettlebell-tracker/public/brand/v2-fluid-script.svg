    <path d="
      M375 105 C390 98 408 100 415 112
      C422 125 418 145 408 155
      C398 165 380 163 372 150
      C364 138 365 115 375 105Z
    " fill="#0A0A0A" opacity="0.6"/>

    <!-- m - organic waves -->
    <path d="
      M460 175 C458 155 455 130 460 110 C463 95 468 85 475 82
      C482 80 490 85 495 95 C500 108 498 125 500 110
      C502 95 508 82 518 78 C528 75 538 82 542 95
      C546 108 545 125 548 110 C550 95 555 82 565 78
      C575 75 585 85 588 100 C590 115 588 140 585 165
      C583 180 580 195 578 185
    " fill="none" stroke="#0A0A0A" stroke-width="2.2"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Large accent blob (like HIT's filled sections) -->
