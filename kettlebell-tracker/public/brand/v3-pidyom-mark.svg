<svg viewBox="0 0 130 210" xmlns="http://www.w3.org/2000/svg">
  <!--
    PIDYOM Mark — "The Rising Arc"
    Mathematical Construction Based on Fibonacci Sequence

    Grid unit = 1
    Fibonacci: 1, 1, 2, 3, 5, 8, 13, 21

    Body circle diameter: 80 (≈ 8 × 10 grid units)
    Handle arc outer radius: 34 (proportional to body via φ)
    Handle thickness: 10 (≈ body/8)
    Overall height: ~195 (body 80 + handle ~60 + spacing)
    Overall width: ~120 (body diameter + margins)
    Width:Height ≈ 120:195 ≈ 1:1.625 ≈ 1:φ (golden ratio)

    The entire mark tilts 0° but the handle arc is offset to create
    dynamic tension — the weight appears to be in motion, being lifted.
  -->

  <!-- Definitions -->
  <defs>
    <!-- Halftone/dither texture (cast iron reference) -->
    <pattern id="ironTexture" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#1A1A1A"/>
      <circle cx="1.5" cy="1.5" r="0.4" fill="#2A2A28" opacity="0.3"/>
    </pattern>
  </defs>

  <g transform="translate(65, 105)">
    <!--
      CONSTRUCTION:
      Center of body circle = origin (0, 50)
      Handle arc center = origin (0, -8)
      Handle connects to body at ~±30° from top of circle
    -->

    <!-- BODY — Circle, radius 40 (diameter 80, Fibonacci 8×10) -->
    <!-- Positioned lower, center at (0, 50) -->
    <circle cx="0" cy="50" r="40" fill="#1A1A1A"/>

    <!-- HANDLE — Arc, creates the "rising" gesture -->
    <!-- Outer arc: radius 30 (Fibonacci 3×10), from ~210° to ~330° (sweep over top) -->
    <!-- Inner arc: radius 20 (Fibonacci 2×10) -->
    <!-- The handle shape is a thick arc that connects to the body -->

    <!--
      Handle outer path:
      Two arcs forming the handle silhouette, connecting to body at tangent points
      Body top is at y=10 (50-40)
      Handle extends from body surface upward
    -->
    <path d="
      M-24 18
      C-26 5 -24 -12 -18 -22
      C-12 -32 -4 -38 0 -40
      C4 -38 12 -32 18 -22
      C24 -12 26 5 24 18
      L16 14
      C18 5 16 -5 12 -14
      C8 -22 4 -28 0 -30
      C-4 -28 -8 -22 -12 -14
      C-16 -5 -18 5 -16 14
      Z
    " fill="#1A1A1A"/>

    <!--
      Connection pieces: blend handle into body smoothly
      The handle "grows" from the body like a natural form
    -->

    <!-- Small highlight circle — suggests the "eye" / center of gravity -->
    <!-- Positioned at golden ratio point within body: 40 × 0.618 ≈ 25 from center -->
    <!-- Actually let's make it subtle — a small bright dot showing center of mass -->
  </g>
</svg>
