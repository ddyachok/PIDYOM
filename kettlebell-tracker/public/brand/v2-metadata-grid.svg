<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- PIDYOM v2 — Metadata Grid Identity System -->
  <rect width="600" height="600" fill="#0D0D0D"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#fff" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
  </g>

  <!-- Circle monogram cluster (like HIT) -->
  <g transform="translate(60, 35)">
    <circle cx="22" cy="22" r="20" fill="none" stroke="#C6FF00" stroke-width="1.5"/>
    <text x="22" y="28" text-anchor="middle" font-family="'Barlow Condensed', sans-serif"
          font-weight="800" font-size="22" fill="#C6FF00">P</text>

    <circle cx="68" cy="22" r="20" fill="none" stroke="#C6FF00" stroke-width="1.5"/>
    <text x="68" y="28" text-anchor="middle" font-family="'Barlow Condensed', sans-serif"
          font-weight="800" font-size="22" fill="#C6FF00">I</text>

    <circle cx="114" cy="22" r="20" fill="none" stroke="#C6FF00" stroke-width="1.5"/>
    <text x="114" y="28" text-anchor="middle" font-family="'Barlow Condensed', sans-serif"
          font-weight="800" font-size="22" fill="#C6FF00">D</text>

    <circle cx="45" cy="62" r="20" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text x="45" y="68" text-anchor="middle" font-family="'Barlow Condensed', sans-serif"
          font-weight="800" font-size="22" fill="#fff">Y</text>

    <circle cx="91" cy="62" r="20" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text x="91" y="68" text-anchor="middle" font-family="'Barlow Condensed', sans-serif"
          font-weight="800" font-size="22" fill="#fff">O</text>

    <circle cx="137" cy="62" r="20" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text x="137" y="68" text-anchor="middle" font-family="'Barlow Condensed', sans-serif"
          font-weight="800" font-size="22" fill="#fff">M</text>
  </g>

  <!-- Metadata column 1 -->
  <g transform="translate(250, 35)" font-family="'Space Mono', monospace" font-size="10" fill="#fff" letter-spacing="1">
    <text x="0" y="12" fill="#C6FF00">Kettlebell</text>
    <text x="0" y="26">est.2025</text>
    <text x="0" y="40">Track</text>
    <text x="0" y="54">Progress</text>
  </g>

  <!-- Divider -->
  <text x="380" y="55" font-family="'Space Mono', monospace" font-size="14" fill="#fff" opacity="0.3">//</text>

  <!-- Metadata column 2 -->
  <g transform="translate(420, 35)" font-family="'Space Mono', monospace" font-size="10" letter-spacing="1">
    <text x="0" y="12" fill="#C6FF00">Workout</text>
    <text x="100" y="12" fill="#fff">Strength</text>
    <text x="0" y="26" fill="#fff">Schedule</text>
    <text x="100" y="26" fill="#fff">Power</text>
    <text x="0" y="40" fill="#fff">Analytics</text>
    <text x="100" y="40" fill="#fff">Tribe</text>
    <text x="0" y="54" fill="#fff" opacity="0.4">Community</text>
  </g>

  <!-- Main large display text -->
  <text x="300" y="310" text-anchor="middle"
        font-family="'Barlow Condensed', sans-serif"
        font-weight="800" font-size="140" letter-spacing="18" fill="#C6FF00">
    PIDYOM
  </text>

  <!-- Accent line under -->
  <line x1="60" y1="345" x2="540" y2="345" stroke="#C6FF00" stroke-width="1" opacity="0.3"/>

  <!-- Subtext -->
  <text x="300" y="380" text-anchor="middle"
        font-family="'Space Mono', monospace"
        font-weight="400" font-size="12" letter-spacing="8" fill="#6A6A62">
    KETTLEBELL TRACKER
  </text>

  <!-- Bottom grid — specs -->
  <g transform="translate(60, 430)" font-family="'Space Mono', monospace" font-size="9" fill="#fff" opacity="0.35" letter-spacing="1">
    <text x="0" y="0">COLOR</text>
    <text x="0" y="14">#C6FF00</text>
    <text x="0" y="28">ACID</text>

    <text x="120" y="0">FONT.01</text>
    <text x="120" y="14">BARLOW</text>
    <text x="120" y="28">CONDENSED</text>

    <text x="250" y="0">FONT.02</text>
    <text x="250" y="14">SPACE</text>
    <text x="250" y="28">MONO</text>

    <text x="380" y="0">TYPE</text>
    <text x="380" y="14">BRUTALIST</text>
    <text x="380" y="28">MINIMAL</text>
  </g>

  <!-- Bottom decorative circles -->
  <g transform="translate(60, 520)">
    <circle cx="10" cy="10" r="6" fill="#C6FF00"/>
    <circle cx="30" cy="10" r="6" fill="none" stroke="#C6FF00" stroke-width="1"/>
    <circle cx="50" cy="10" r="6" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Version -->
  <text x="540" y="530" text-anchor="end" font-family="'Space Mono', monospace" font-size="9" fill="#fff" opacity="0.2" letter-spacing="1">
    V.02 / 2025
  </text>
</svg>
